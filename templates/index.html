<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inbox Radar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:       #1A1D2E;
      --navy-light: #252941;
      --navy-border:#2F3452;
      --white:      #FFFFFF;
      --bg:         #F0F2F8;
      --card:       #FFFFFF;
      --text:       #1A1D2E;
      --muted:      #6B7280;
      --border:     #E5E7EB;

      --indigo:     #5B5BD6;
      --indigo-bg:  #EEF2FF;
      --amber:      #D97706;
      --amber-bg:   #FEF3C7;
      --amber-bar:  #F59E0B;
      --blue:       #2563EB;
      --blue-bg:    #DBEAFE;
      --blue-bar:   #3B82F6;
      --red:        #DC2626;
      --red-bg:     #FEE2E2;
      --red-bar:    #EF4444;
      --slate:      #4B5563;
      --slate-bg:   #F3F4F6;
      --slate-bar:  #9CA3AF;

      --sidebar-w:  260px;
      --detail-w:   380px;
      --radius:     10px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── SIDEBAR ─────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--navy);
      display: flex;
      flex-direction: column;
      padding: 0;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 24px 20px 20px;
      border-bottom: 1px solid var(--navy-border);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      background: var(--indigo);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-icon svg { width: 16px; height: 16px; }

    .brand-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .brand-sub {
      font-size: 11px;
      color: #6B7A9F;
      margin-left: 42px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #34D399;
      animation: pulse-dot 2.5s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    .status-text {
      font-size: 11px;
      color: #8B98BE;
      font-family: 'JetBrains Mono', monospace;
    }

    /* category filters */
    .sidebar-filters {
      padding: 16px 12px;
      flex: 1;
      overflow-y: auto;
    }

    .filter-label {
      font-size: 10px;
      font-weight: 600;
      color: #4B5A7A;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0 8px;
      margin-bottom: 8px;
    }

    .filter-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border: none;
      background: transparent;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 2px;
    }

    .filter-btn:hover { background: var(--navy-light); }

    .filter-btn.active { background: var(--navy-light); }

    .filter-swatch {
      width: 3px;
      height: 20px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .filter-name {
      font-size: 13px;
      color: #C5CDE8;
      font-weight: 500;
      flex: 1;
      text-align: left;
    }

    .filter-btn.active .filter-name { color: var(--white); }

    .filter-count {
      font-size: 12px;
      font-weight: 600;
      color: #4B5A7A;
      font-family: 'JetBrains Mono', monospace;
      min-width: 20px;
      text-align: right;
    }

    .filter-btn.active .filter-count { color: #8B98BE; }

    /* run button */
    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid var(--navy-border);
    }

    .run-btn {
      width: 100%;
      background: var(--indigo);
      color: var(--white);
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: opacity 0.15s, transform 0.1s;
    }

    .run-btn:hover { opacity: 0.88; }
    .run-btn:active { transform: scale(0.98); }
    .run-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .run-btn svg { width: 14px; height: 14px; }

    .last-updated {
      font-size: 10px;
      color: #4B5A7A;
      text-align: center;
      margin-top: 8px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── MAIN CONTENT ─────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .topbar-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .topbar-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
    }

    .stats-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .stat-chip {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 11px;
      border-radius: 20px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.02em;
    }

    /* ── EMAIL LIST ───────────────────────────────── */
    .content-area {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .email-list {
      flex: 1;
      overflow-y: auto;
      padding: 0;
      display: flex;
      flex-direction: column;
      background: var(--card);
    }

    .email-row {
      background: var(--card);
      display: flex;
      align-items: center;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      height: 52px;
      transition: background 0.1s;
      gap: 0;
      position: relative;
    }

    .email-row:hover {
      background: #F5F6FA;
    }

    .email-row.active {
      background: #EEF2FF;
      border-left: 3px solid var(--indigo);
    }

    /* left accent bar removed — replaced by inline category chip */
    .category-bar { display: none; }

    /* sender column — fixed width */
    .email-sender {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      width: 180px;
      min-width: 180px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 16px;
    }

    /* middle: subject + dash + preview inline */
    .email-body {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 0;
      overflow: hidden;
    }

    .email-meta { display: none; } /* sender moved outside */

    .email-subject {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      flex-shrink: 0;
      max-width: 340px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .email-divider {
      color: var(--muted);
      font-size: 13px;
      margin: 0 6px;
      flex-shrink: 0;
    }

    .email-preview {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* right side: chip + time */
    .email-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      margin-left: 12px;
    }

    .email-time {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      min-width: 52px;
      text-align: right;
    }

    .cat-chip {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      text-transform: capitalize;
      flex-shrink: 0;
      letter-spacing: 0.02em;
    }

    /* empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 10px;
      padding: 40px;
    }

    .empty-state svg { opacity: 0.25; width: 40px; height: 40px; }
    .empty-state p { font-size: 14px; }
    .empty-state span { font-size: 12px; }

    /* ── DETAIL PANEL ─────────────────────────────── */
    .detail-panel {
      width: 0;
      min-width: 0;
      background: var(--card);
      border-left: 1px solid var(--border);
      overflow: hidden;
      transition: width 0.22s cubic-bezier(0.4, 0, 0.2, 1),
                  min-width 0.22s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .detail-panel.open {
      width: var(--detail-w);
      min-width: var(--detail-w);
    }

    .detail-inner {
      width: var(--detail-w);
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow-y: auto;
    }

    .detail-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      flex-shrink: 0;
    }

    .detail-sender-block { flex: 1; min-width: 0; }

    .detail-sender {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .detail-email-addr {
      font-size: 11px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .close-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 2px;
      flex-shrink: 0;
      border-radius: 4px;
      display: flex;
      align-items: center;
    }

    .close-btn:hover { color: var(--text); background: var(--bg); }

    .detail-subject {
      padding: 14px 18px 0;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text);
      flex-shrink: 0;
    }

    .detail-cat-row {
      padding: 10px 18px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .detail-section {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }

    .detail-section:last-child { border-bottom: none; }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .summary-text {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
    }

    .preview-text {
      font-size: 13px;
      line-height: 1.6;
      color: var(--muted);
      font-style: italic;
    }

    .detail-meta-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .importance-meter {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
    }

    .importance-track {
      width: 60px;
      height: 5px;
      border-radius: 3px;
      background: var(--border);
      overflow: hidden;
    }

    .importance-fill {
      height: 100%;
      border-radius: 3px;
    }

    .action-tag {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 5px;
      background: #FEE2E2;
      color: #991B1B;
    }

    .deadline-callout {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #FEF3C7;
      border: 1px solid #FDE68A;
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 12.5px;
      font-weight: 600;
      color: #92400E;
    }

    .opportunity-callout {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #ECFDF5;
      border: 1px solid #A7F3D0;
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 12.5px;
      font-weight: 600;
      color: #065F46;
    }

    .readonly-notice {
      margin: 0 18px 16px;
      background: #F0F2F8;
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      flex-shrink: 0;
    }

    .readonly-notice svg { flex-shrink: 0; margin-top: 1px; opacity: 0.5; width:14px; height:14px; }

    .readonly-notice span {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
    }

    /* ── LOADING / SPINNER ────────────────────────── */
    .spinner {
      display: inline-block;
      width: 13px;
      height: 13px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: var(--white);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 3px; }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 4l6 5 6-5" /><rect x="1" y="3" width="14" height="10" rx="2" />
        </svg>
      </div>
      <span class="brand-name">Inbox Radar</span>
    </div>
    <div class="brand-sub">email monitor · read-only</div>
    <div class="status-row">
      <div class="status-dot"></div>
      <span class="status-text" id="statusText">loading…</span>
    </div>
  </div>

  <div class="sidebar-filters">
    <div class="filter-label">Categories</div>
    <button class="filter-btn active" onclick="setFilter('all')" id="filter-all">
      <div class="filter-swatch" style="background:var(--indigo);"></div>
      <span class="filter-name">All mail</span>
      <span class="filter-count" id="count-all">0</span>
    </button>
    <button class="filter-btn" onclick="setFilter('interview')" id="filter-interview">
      <div class="filter-swatch" style="background:var(--amber-bar);"></div>
      <span class="filter-name">Interview</span>
      <span class="filter-count" id="count-interview">0</span>
    </button>
    <button class="filter-btn" onclick="setFilter('meeting')" id="filter-meeting">
      <div class="filter-swatch" style="background:var(--blue-bar);"></div>
      <span class="filter-name">Meeting</span>
      <span class="filter-count" id="count-meeting">0</span>
    </button>
    <button class="filter-btn" onclick="setFilter('urgent')" id="filter-urgent">
      <div class="filter-swatch" style="background:var(--red-bar);"></div>
      <span class="filter-name">Urgent</span>
      <span class="filter-count" id="count-urgent">0</span>
    </button>
    <button class="filter-btn" onclick="setFilter('other')" id="filter-other">
      <div class="filter-swatch" style="background:var(--slate-bar);"></div>
      <span class="filter-name">Other</span>
      <span class="filter-count" id="count-other">0</span>
    </button>
  </div>

  <div class="sidebar-footer">
    <button class="run-btn" id="runBtn" onclick="runAgent()">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 7a5 5 0 1 0 5-5" /><path d="M7 2l-2-2M7 2l-2 2" />
      </svg>
      Check inbox now
    </button>
    <div class="last-updated" id="lastUpdated">never refreshed</div>
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="topbarTitle">All mail</div>
      <div class="topbar-sub" id="topbarSub">loading…</div>
    </div>
    <div class="stats-row" id="statsRow"></div>
  </div>

  <div class="content-area">
    <!-- email list -->
    <div class="email-list" id="emailList"></div>

    <!-- detail panel -->
    <div class="detail-panel" id="detailPanel">
      <div class="detail-inner" id="detailInner"></div>
    </div>
  </div>
</div>

<script>
const CAT = {
  interview: { bar: '#F59E0B', bg: '#FEF3C7', text: '#92400E', label: 'Interview' },
  meeting:   { bar: '#3B82F6', bg: '#DBEAFE', text: '#1E40AF', label: 'Meeting'   },
  urgent:    { bar: '#EF4444', bg: '#FEE2E2', text: '#991B1B', label: 'Urgent'    },
  other:     { bar: '#9CA3AF', bg: '#F3F4F6', text: '#374151', label: 'Other'     },
};

let allEmails = [];
let currentFilter = 'all';
let selectedId = null;

function fmt(dt) {
  if (!dt) return 'never';
  const d = new Date(dt);
  return d.toLocaleString('en-IN', { hour: '2-digit', minute: '2-digit', month: 'short', day: 'numeric' });
}

async function loadEmails() {
  document.getElementById('statusText').textContent = 'fetching…';
  try {
    const res = await fetch('/api/emails');
    const data = await res.json();
    allEmails = data.emails || [];
    const lu = data.last_updated;
    document.getElementById('lastUpdated').textContent = lu ? 'refreshed ' + fmt(lu) : 'never refreshed';
    document.getElementById('statusText').textContent = 'monitoring · read-only';
    updateCounts();
    renderList();
  } catch (e) {
    document.getElementById('statusText').textContent = 'error loading data';
  }
}

function updateCounts() {
  const counts = { all: allEmails.length, interview: 0, meeting: 0, urgent: 0, other: 0 };
  allEmails.forEach(e => { if (counts[e.category] !== undefined) counts[e.category]++; });
  Object.keys(counts).forEach(k => {
    const el = document.getElementById('count-' + k);
    if (el) el.textContent = counts[k];
  });
  // stats chips in topbar
  const row = document.getElementById('statsRow');
  row.innerHTML = ['interview','meeting','urgent']
    .filter(k => counts[k] > 0)
    .map(k => `<span class="stat-chip" style="background:${CAT[k].bg};color:${CAT[k].text};">${counts[k]} ${CAT[k].label}</span>`)
    .join('');
}

function setFilter(cat) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('filter-' + cat).classList.add('active');
  const titles = { all: 'All mail', interview: 'Interviews', meeting: 'Meetings', urgent: 'Urgent', other: 'Other' };
  document.getElementById('topbarTitle').textContent = titles[cat];
  selectedId = null;
  document.getElementById('detailPanel').classList.remove('open');
  renderList();
}

function filtered() {
  if (currentFilter === 'all') return allEmails;
  return allEmails.filter(e => e.category === currentFilter);
}

function renderList() {
  const list = document.getElementById('emailList');
  const emails = filtered();

  document.getElementById('topbarSub').textContent =
    emails.length === 0 ? 'no emails' :
    emails.length === 1 ? '1 email' : `${emails.length} emails`;

  if (emails.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 8l10 7 10-7"/>
        </svg>
        <p>No emails in this category</p>
        <span>Click "Check inbox now" to refresh</span>
      </div>`;
    return;
  }

  list.innerHTML = emails.map(e => {
    const c = CAT[e.category] || CAT.other;
    const active = e.id === selectedId ? ' active' : '';
    const time = e.received_at ? fmt(e.received_at) : '';
    return `
      <div class="email-row${active}" onclick="selectEmail('${e.id}')">
        <span class="email-sender">${esc(e.sender_name || e.sender_email)}</span>
        <div class="email-body">
          <span class="email-subject">${esc(e.subject)}</span>
          <span class="email-divider">&#8211;</span>
          <span class="email-preview">${esc(e.preview)}</span>
        </div>
        <div class="email-right">
          <span class="cat-chip" style="background:${c.bg};color:${c.text};">${c.label}</span>
          <span class="email-time">${time}</span>
        </div>
      </div>`;
  }).join('');
}

function selectEmail(id) {
  selectedId = id;
  renderList();
  const email = allEmails.find(e => e.id === id);
  if (!email) return;
  const c = CAT[email.category] || CAT.other;
  const panel = document.getElementById('detailPanel');
  const inner = document.getElementById('detailInner');
  inner.innerHTML = `
    <div class="detail-header">
      <div class="detail-sender-block">
        <div class="detail-sender">${esc(email.sender_name || email.sender_email)}</div>
        <div class="detail-email-addr">${esc(email.sender_email)}</div>
      </div>
      <button class="close-btn" onclick="closeDetail()" title="Close">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <path d="M4 4l8 8M12 4l-8 8"/>
        </svg>
      </button>
    </div>
    <div class="detail-subject">${esc(email.subject)}</div>
    <div class="detail-cat-row">
      <div class="detail-meta-row">
        <span class="cat-chip" style="background:${c.bg};color:${c.text};font-size:11px;">${c.label}</span>
        <span class="importance-meter">
          <span class="importance-track">
            <span class="importance-fill" style="width:${(email.importance || 0) * 10}%;background:${impColor(email.importance)};"></span>
          </span>
          ${email.importance || '–'}/10
        </span>
        ${email.action_needed ? '<span class="action-tag">Action needed</span>' : ''}
      </div>
    </div>
    ${email.deadline ? `
    <div class="detail-section" style="border-bottom:none;padding-bottom:0;">
      <div class="deadline-callout">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="8" cy="8" r="6.5"/><path d="M8 4.5V8l2.5 1.5"/></svg>
        <span>Deadline: ${esc(email.deadline)}</span>
      </div>
    </div>` : ''}
    ${email.opportunity ? `
    <div class="detail-section" style="border-bottom:none;padding-top:8px;padding-bottom:0;">
      <div class="opportunity-callout">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 8l4.5 4.5L14 4"/></svg>
        <span>Flagged as a career opportunity</span>
      </div>
    </div>` : ''}
    <div class="detail-section">
      <div class="section-label">Summary</div>
      <div class="summary-text">${esc(email.summary)}</div>
    </div>
    <div class="detail-section">
      <div class="section-label">Raw preview</div>
      <div class="preview-text">${esc(email.preview)}</div>
    </div>
    <div class="readonly-notice">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <rect x="3" y="6" width="8" height="6" rx="1"/><path d="M5 6V4a2 2 0 0 1 4 0v2"/>
      </svg>
      <span>This agent only reads. Replying, archiving, or deleting always happens from your own inbox.</span>
    </div>`;
  panel.classList.add('open');
}

function closeDetail() {
  selectedId = null;
  document.getElementById('detailPanel').classList.remove('open');
  renderList();
}

async function runAgent() {
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Checking…';
  try {
    const res = await fetch('/api/run', { method: 'POST' });
    const data = await res.json();
    if (data.ok) {
      await loadEmails();
    } else {
      document.getElementById('statusText').textContent = 'error — check terminal';
      console.error(data.error);
    }
  } catch (e) {
    document.getElementById('statusText').textContent = 'failed to reach server';
  } finally {
    btn.disabled = false;
    btn.innerHTML = `
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 7a5 5 0 1 0 5-5"/><path d="M7 2l-2-2M7 2l-2 2"/>
      </svg>
      Check inbox now`;
  }
}

function impColor(score) {
  score = score || 0;
  if (score >= 8) return '#EF4444';
  if (score >= 6) return '#F59E0B';
  if (score >= 4) return '#3B82F6';
  return '#9CA3AF';
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadEmails();
</script>
</body>
</html>
